<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Đăng Ký Tài Khoản</title>

    <link rel="stylesheet"
          href="../css/style3.css">

</head>

<body>

    <div class="container">

        <form id="frmRegister">

            <h2 id="title">
                Đăng ký tài khoản
            </h2>

            <div class="form-group">

                <label for="txtFullname">
                    Họ và tên
                </label>

                <input type="text"
                       id="txtFullname"
                       class="form-control"
                       placeholder="Nhập họ tên">

            </div>

            <div class="form-group">

                <label for="txtEmail">
                    Email
                </label>

                <input type="email"
                       id="txtEmail"
                       class="form-control"
                       placeholder="Nhập email">

            </div>

            <div class="form-group">

                <label for="txtUsername">
                    Username
                </label>

                <input type="text"
                       id="txtUsername"
                       class="form-control"
                       placeholder="Tên đăng nhập">

            </div>

            <div class="form-group">

                <label for="txtPassword">
                    Password
                </label>

                <input type="password"
                       id="txtPassword"
                       class="form-control"
                       placeholder="Mật khẩu">

            </div>

            <div class="form-group">

                <label for="txtRePassword">
                    Nhập lại Password
                </label>

                <input type="password"
                       id="txtRePassword"
                       class="form-control"
                       placeholder="Nhập lại mật khẩu">

            </div>

            <input type="submit"
                   value="Đăng Ký"
                   id="sbRegister">

            <input type="reset"
                   value="Hủy"
                   id="rsCancel">

        </form>

    </div>

</body>

</html>
