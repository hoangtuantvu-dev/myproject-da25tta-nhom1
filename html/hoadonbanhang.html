<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa Đơn Bán Hàng</title>
</head>
<body>
    <h1>HÓA ĐƠN BÁN HÀNG</h1>
        <link rel="stylesheet"
          href="../css/style4.css">
    <table border="1">
        <thead>
            <tr>
                <th>STT</th>
                <th>Tên Hàng</th>
                <th>Số Lượng</th>
                <th>Đơn Giá</th>
                <th>ĐvT</th>
                <th>Thành Tiền</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Sản phẩm A</td>
                <td class="soluong">2</td>
                <td class="dongia">50,000</td>
                <td>Cái</td>
                <td class="thanhtien">100,000</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Sản phẩm B</td>
                <td class="soluong">3</td>
                <td class="dongia">30,000</td>
                <td>Cái</td>
                <td class="thanhtien">90,000</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Sản phẩm C</td>
                <td class="soluong">1</td>
                <td class="dongia">75,000</td>
                <td>Cái</td>
                <td class="thanhtien">75,000</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Sản phẩm D</td>
                <td class="soluong">5</td>
                <td class="dongia">20,000</td>
                <td>Thùng</td>
                <td class="thanhtien">100,000</td>
            </tr>
            <tr id="tongthanhtoan">
                <td colspan="5"><strong>Tổng Thanh Toán</strong></td>
                <td class="thanhtien"><strong>365,000</strong></td>
            </tr>
        </tbody>
    </table>
    <script>
   const = document.getElementsByClassName('soluong');
    const dongia = document.getElementsByClassName('dongia');
    const thanhtien = document.getElementsByClassName('thanhtien'); 
    let tongthanhtoan = 0;

        const sl = parseInt(soluong[i].textContent); 
        const dg = parseInt(dongia[i].textContent.replace(/,/g, ''));
        const tt = sl * dg;
        thanhtien[i].textContent = tt.toLocaleString();
        tongthanhtoan += tt;
    }
    </script>
</body>
</html>
